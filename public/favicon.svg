<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#0080ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" fill="url(#bg)"/>

  <!-- Top neon line -->
  <rect x="0" y="0" width="64" height="1.5" fill="url(#neon)" opacity="0.8"/>
  <!-- Bottom gold line -->
  <rect x="0" y="62.5" width="64" height="1.5" fill="url(#gold)" opacity="0.8"/>

  <!-- Diamond shape border -->
  <polygon points="32,4 60,32 32,60 4,32"
    fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>

  <!-- Inner diamond -->
  <polygon points="32,12 52,32 32,52 12,32"
    fill="none" stroke="url(#neon)" stroke-width="0.5" opacity="0.2"/>

  <!-- A letter -->
  <text x="20" y="38"
    font-family="Georgia, serif"
    font-size="20"
    font-weight="400"
    fill="url(#neon)"
    filter="url(#glow)"
    letter-spacing="-1">A</text>

  <!-- N letter -->
  <text x="34" y="38"
    font-family="Georgia, serif"
    font-size="20"
    font-weight="400"
    fill="url(#gold)"
    filter="url(#glow)"
    letter-spacing="-1">N</text>

  <!-- Corner accents -->
  <line x1="2" y1="2" x2="10" y2="2" stroke="#00f0ff" stroke-width="1" opacity="0.5"/>
  <line x1="2" y1="2" x2="2" y2="10" stroke="#00f0ff" stroke-width="1" opacity="0.5"/>
  <line x1="62" y1="62" x2="54" y2="62" stroke="#FFD700" stroke-width="1" opacity="0.5"/>
  <line x1="62" y1="62" x2="62" y2="54" stroke="#FFD700" stroke-width="1" opacity="0.5"/>
  <line x1="62" y1="2" x2="54" y2="2" stroke="#FFD700" stroke-width="1" opacity="0.5"/>
  <line x1="62" y1="2" x2="62" y2="10" stroke="#FFD700" stroke-width="1" opacity="0.5"/>
  <line x1="2" y1="62" x2="10" y2="62" stroke="#00f0ff" stroke-width="1" opacity="0.5"/>
  <line x1="2" y1="62" x2="2" y2="54" stroke="#00f0ff" stroke-width="1" opacity="0.5"/>
</svg>
